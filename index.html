<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ Rushed Portal & Visual Mapping Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #07090e; color: #e1e1e6; line-height: 1.6; padding: 20px 10px; text-align: center; }
        
        /* HEADER BAR MATCHING THE STYLE */
        .top-header { background: linear-gradient(135deg, #101424, #1a223f); color: #45f3ff; padding: 18px; font-weight: bold; font-size: 1.8rem; letter-spacing: 1px; margin-bottom: 25px; border-radius: 8px; border: 1px solid #45f3ff; text-transform: uppercase; text-shadow: 0 0 10px rgba(69,243,255,0.5); }
        
        .container { max-width: 750px; margin: 0 auto; }

        /* THE 3x3 MENU CARD GRID */
        .sonolus-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .grid-card { background: #121622; border: 1px solid #232d42; padding: 20px 10px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #a4a7ab; font-weight: bold; font-size: 1.05rem; transition: all 0.2s ease; }
        .grid-card:hover { background: #171d2d; border-color: #45f3ff; color: #45f3ff; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(69,243,255,0.1); }
        .grid-card svg { width: 45px; height: 45px; fill: currentColor; margin-bottom: 12px; }

        /* PARAMETERS CARD PANEL */
        .panel { background: #121622; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #232d42; text-align: left; }
        .panel h3 { color: #45f3ff; margin-bottom: 10px; font-size: 1.3rem; text-shadow: 0 0 5px rgba(69,243,255,0.3); }
        .url-box { background: #07090e; border: 1px solid #232d42; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 1rem; color: #50fa7b; display: block; width: 100%; margin: 10px 0; text-align: center; }
        .btn { display: inline-block; width: 100%; background: #45f3ff; color: #07090e; padding: 14px; font-weight: bold; text-decoration: none; border-radius: 6px; font-size: 1.1rem; border: none; cursor: pointer; text-align: center; font-weight: bold; box-shadow: 0 4px 12 rgba(69, 243, 255, 0.2); }
        .btn:hover { background: #66fcf1; }

        /* TIMELINE MAKER PLACEMENT CANVAS CONTAINER */
        .editor-workspace { background: #121622; border-radius: 8px; padding: 20px; border: 1px solid #232d42; margin-top: 25px; }
        .control-row { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        .control-group { display: flex; flex-direction: column; flex: 1; text-align: left; }
        .control-group label { font-weight: bold; font-size: 0.85rem; color: #45f3ff; margin-bottom: 5px; }
        input, select { background: #07090e; border: 1px solid #232d42; padding: 10px; border-radius: 6px; color: #fff; font-size: 0.95rem; width: 100%; }
        input:focus, select:focus { border-color: #45f3ff; outline: none; }
        canvas { background: #07090e; cursor: crosshair; display: block; margin: 15px auto; border-radius: 6px; border: 1px solid #232d42; box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-header">Project: RUSHER Studio</div>

        <!-- 3x3 MENU LAYOUT GRID -->
        <div class="sonolus-grid">

                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>

            </a>
            <a href="#" class="grid-card">

            </a>
            <a href="#" class="grid-card">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>

            </a>
            <a href="#" class="grid-card">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 12 12 12 12-4.48 12-12S17.52 2 12 2zm0 13c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>
                <span>Skins</span>
            </a>
            <a href="#" class="grid-card">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5.5 9L11 14.5 8.5 11.5 5 16h14l-4.5-5z"/></svg>
                <span>Backgrounds</span>
            </a>
            <a href="#" class="grid-card">
                <svg viewBox="0 0 24 24"><path d="M12 22c5.52 0 10-2.24 10-5V7c0-2.76-4.48-5-10-5S2 4.24 2 7v10c0 2.76 4.48 5 10 5zm0-18c4.42 0 8 1.34 8 3s-3.58 3-8 3-8-1.34-8-3 3.58-3 8-3z"/></svg>
                <span>SFX</span>
            </a>
            <a href="#" class="grid-card">
                <svg viewBox="0 0 24 24"><path d="M7 2v11h10V2H7zm5 9c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>
                <span>Particles</span>
            </a>
            <a href="#" class="grid-card">
                <svg viewBox="0 0 24 24"><path d="M12 2.22l-1.35 1.35c.75.29 1.35.9 1.64 1.64L13.64 3.9 12 2.22zM9 4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H9z"/></svg>
                <span>Engines</span>
            </a>
            <a href="#" class="grid-card">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span>Configuration</span>
            </a>
        </div>

        <!-- APP CONNECTOR PANEL -->
        <div class="panel">
            <h3>🔗 Connect to Sonolus</h3>
            <input type="text" class="url-box" id="serverUrl" readonly>
            <a id="deepLink" href="#" class="btn">🚀 Open in Sonolus App</a>
        </div>

        <!-- VISUAL CAPSULE EDITOR CANVAS BOX -->
        <div class="editor-workspace">
            <h3 style="color:#45f3ff; margin-bottom:15px; font-size:1.4rem; text-align:left;">🛠️ Horizontal Note Builder Grid</h3>
            <div class="control-row">
                <div class="control-group">
                    <label>BPM Speed</label>
                    <input type="number" id="bpmRate" value="150">
                </div>
                <div class="control-group">
                    <label>Placement Note Type</label>
                    <select id="noteTypeSelector">
                        <option value="2">🔵 Blue Horizontal Tap Slider</option>
                        <option value="3">💗 Pink Horizontal Flick Slider</option>
                    </select>
                </div>
            </div>
            
            <canvas id="editorGrid" width="400" height="480"></canvas>
            <button onclick="compileVisualChart()" class="btn" style="background:#45f3ff; color:#07090e; margin-top:10px;">⚡ Compile Visual Level Notes</button>
            <textarea id="shareLinkResult" style="margin-top:15px; font-family:monospace; font-size:0.85rem; height:80px; display:none; width:100%; background:#07090e; border:1px solid #45f3ff; color:#50fa7b; padding:10px; border-radius:6px;" readonly></textarea>
        </div>
    </div>

    <!-- Pako compiler frame for handling compression routines -->
    <script src="https://cloudflare.com"></script>
    <script>
        const canvas = document.getElementById('editorGrid');
        const ctx = canvas.getContext('2d');
        const numLanes = 3, totalBeats = 12;
        const laneWidth = canvas.width / numLanes, beatHeight = canvas.height / totalBeats;
        let notesArray = [];

        // DYNAMIC DOMAIN DETECTOR: Automatically reads your clean domain address
        const currentDomain = window.location.origin + window.location.pathname.replace('index.html', '');
        const cleanDomain = currentDomain.replace(/\/\$/, ""); 
        
        document.getElementById('serverUrl').value = cleanDomain;
        document.getElementById('deepLink').href = "sonolus://" + cleanDomain.replace(/^https?:\/\//, "");

        function drawEditorGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#161f30'; ctx.lineWidth = 1;
            for (let i = 1; i < numLanes; i++) { ctx.beginPath(); ctx.moveTo(i * laneWidth, 0); ctx.lineTo(i * laneWidth, canvas.height); ctx.stroke(); }
            for (let j = 0; j <= totalBeats; j++) { ctx.beginPath(); ctx.moveTo(0, j * beatHeight); ctx.lineTo(canvas.width, j * beatHeight); ctx.stroke(); }

            // DRAW WHITE LEFT VERTICAL JUDGMENT BAR
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(40, 0); ctx.lineTo(40, canvas.height); ctx.stroke();

            // RENDER GLOWING CAPSULE HORIZONTAL SLIDERS
            notesArray.forEach(note => {const laneCenterY = canvas.height - ((note.beat) * beatHeight) - (beatHeight / 2);
const sliderStartX = 40;
const sliderWidth = 220;
const mainColor = note.type === 2 ? '#00bfff' : '#ff1493';
// Glowing background slider trail line path
ctx.strokeStyle = mainColor; ctx.lineWidth = 26; ctx.lineCap = 'round';
ctx.beginPath(); ctx.moveTo(sliderStartX, laneCenterY); ctx.lineTo(sliderStartX + sliderWidth, laneCenterY); ctx.stroke();
// Inner clean solid color core line path
ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 14;
ctx.beginPath(); ctx.moveTo(sliderStartX, laneCenterY); ctx.lineTo(sliderStartX + sliderWidth, laneCenterY); ctx.stroke();
// The touch target sensor circle head
ctx.fillStyle = mainColor; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
ctx.beginPath(); ctx.arc(sliderStartX + sliderWidth, laneCenterY, 18, 0, 2 * Math.PI); ctx.fill(); ctx.stroke();
// Inner white center dot
ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(sliderStartX + sliderWidth, laneCenterY, 6, 0, 2 * Math.PI); ctx.fill();
});
}
// GRID PLACEMENT CLICK TRACKER
canvas.addEventListener('click', function(event) {
const rect = canvas.getBoundingClientRect();
const clickX = event.clientX - rect.left, clickY = event.clientY - rect.top;
const targetLaneIndex = Math.floor(clickX / laneWidth) - 1;
const targetBeat = Math.floor((canvas.height - clickY) / beatHeight);
const selectedType = parseInt(document.getElementById('noteTypeSelector').value);
const existingIndex = notesArray.findIndex(n => n.beat === targetBeat && n.laneIndex === targetLaneIndex);
if (existingIndex !== -1) { notesArray.splice(existingIndex, 1); }
else { notesArray.push({ beat: targetBeat, laneIndex: targetLaneIndex, type: selectedType }); }
drawEditorGrid();
});
// SHARING LINK CODE DATA PACKER GENERATOR USING THE DETECTED DOMAIN
function compileVisualChart() {
const bpm = parseInt(document.getElementById('bpmRate').value);
let chartPayload = { "version": 1, "bgmOffset": 0.0, "entities": [{ "archetype": 0, "data": [{ "name": "beat", "value": 0 }, { "name": "bpm", "value": bpm }] }, { "archetype": 1, "data": [] }] };
notesArray.forEach(n => { chartPayload.entities.push({ "archetype": n.type, "data": [{ "name": "targetBeat", "value": n.beat + 1 }, { "name": "laneIndex", "value": n.laneIndex }, { "name": "laneHeight", "value": 0.25 }] }); });
const compressedBin = pako.gzip(JSON.stringify(chartPayload));
const base64String = btoa(String.fromCharCode.apply(null, compressedBin));
// Clean dynamic deep link connection setup
const txtArea = document.getElementById('shareLinkResult');
const cleanAppDomain = cleanDomain.replace(/^https?:///, "");
txtArea.value = "sonolus://" + cleanAppDomain + "?chart=" + base64String;
txtArea.style.display = 'block';

}
drawEditorGrid();

        if (note.type === 4 || note.type === 5) {const sliderStartX = 50;const sliderWidth = laneCenterX - 30;ctx.strokeStyle = mainColor; ctx.lineWidth = 24; ctx.lineCap = 'round';ctx.beginPath(); ctx.moveTo(sliderStartX, laneCenterY); ctx.lineTo(sliderStartX + sliderWidth, laneCenterY); ctx.stroke();ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 12;ctx.beginPath(); ctx.moveTo(sliderStartX, laneCenterY); ctx.lineTo(sliderStartX + sliderWidth, laneCenterY); ctx.stroke();// Circle target head on slider edgectx.fillStyle = mainColor; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;ctx.beginPath(); ctx.arc(sliderStartX + sliderWidth, laneCenterY, 16, 0, 2 * Math.PI); ctx.fill(); ctx.stroke();ctx.fillStyle = '#ffffff';ctx.beginPath(); ctx.arc(sliderStartX + sliderWidth, laneCenterY, 6, 0, 2 * Math.PI); ctx.fill();}// RENDER INDIVIDUAL TAP/FLICK NOTES (Type 2 & 3)else {ctx.fillStyle = mainColor; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4;ctx.beginPath(); ctx.arc(laneCenterX, laneCenterY, 18, 0, 2 * Math.PI); ctx.fill(); ctx.stroke();ctx.fillStyle = '#ffffff';ctx.beginPath(); ctx.arc(laneCenterX, laneCenterY, 6, 0, 2 * Math.PI); ctx.fill();}});}// CORRECTED CLICK INTERACTION HANDLING MATH MATRIXcanvas.addEventListener('click', function(event) {const rect = canvas.getBoundingClientRect();// Scale touch coordinates cleanly on mobile Safari panelsconst clickX = ((event.clientX - rect.left) / rect.width) * canvas.width;const clickY = ((event.clientY - rect.top) / rect.height) * canvas.height;// Map target lane index bounds (0, 1, 2)const targetLaneIndex = Math.floor(clickX / laneWidth);const targetBeat = Math.floor((canvas.height - clickY) / beatHeight);const selectedType = parseInt(document.getElementById('noteTypeSelector').value);if (targetLaneIndex >= 0 && targetLaneIndex < numLanes && targetBeat >= 0 && targetBeat < totalBeats) {const existingIndex = notesArray.findIndex(n => n.beat === targetBeat && n.laneIndex === targetLaneIndex);if (existingIndex !== -1) { notesArray.splice(existingIndex, 1); }else { notesArray.push({ beat: targetBeat, laneIndex: targetLaneIndex, type: selectedType }); }drawEditorGrid();}});function compileVisualChart() {const bpm = parseInt(document.getElementById('bpmRate').value);let chartPayload = { "version": 1, "bgmOffset": 0.0, "entities": [{ "archetype": 0, "data": [{ "name": "beat", "value": 0 }, { "name": "bpm", "value": bpm }] }, { "archetype": 1, "data": [] }] };notesArray.forEach(n => {// Map custom slider types to matching app targetsconst finalArchetype = (n.type === 4 || n.type === 2) ? 2 : 3;chartPayload.entities.push({ "archetype": finalArchetype, "data": [{ "name": "targetBeat", "value": n.beat + 1 }, { "name": "laneIndex", "value": n.laneIndex - 1 }, { "name": "laneHeight", "value": 0.25 }] });});const compressedBin = pako.gzip(JSON.stringify(chartPayload));const base64String = btoa(String.fromCharCode.apply(null, compressedBin));const txtArea = document.getElementById('shareLinkResult');const cleanAppDomain = cleanDomain.replace(/^https?:///, "");txtArea.value = "sonolus://" + cleanAppDomain + "?chart=" + base64String;txtArea.style.display = 'block';alert("Project: RUSHER chart compiled successfully!");}drawEditorGrid();
